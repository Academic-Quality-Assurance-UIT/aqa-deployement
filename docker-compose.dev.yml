services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  absa-service:
    build:
      context: ./aqa-crawl-data/src/sentiment-analysis
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - BUNDLE_DIR=./fold_01
      - HOST=0.0.0.0
      - PORT=8001

  postgres:
    image: postgres:17.5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jnhbgvfc
      POSTGRES_DB: aqa
    volumes:
      - postgresql-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aqa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgresql-volume:
    external: true
    name: aqa-backend-nestjs_postgresql-volume
