services:
  frontend:
    image: hoanghy/aqa-client:latest
    build:
      context: .
      dockerfile: aqa-client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL_V2: ${NEXT_PUBLIC_API_URL_V2:-http://host.docker.internal:8000/graphql}
        BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:8000/graphql}
        BACKEND_API_URL: ${BACKEND_API_URL:-http://host.docker.internal:8000}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:8000/graphql}
      - BACKEND_API_URL=${BACKEND_API_URL:-http://host.docker.internal:8000}
    env_file:
      - .env

  backend:
    image: hoanghy/aqa-backend-nestjs:latest
    build:
      context: .
      dockerfile: aqa-backend-nestjs/Dockerfile
    network_mode: "host"
    environment:
      # These will fall back to your .env file's values
      - DB_TYPE
      - DB_HOST
      - DB_PORT
      - DB_USERNAME
      - DB_PASSWORD
      - DB_DATABASE
      - ABSA_SERVICE_URL=${ABSA_SERVICE_URL:-http://localhost:8001}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env.production

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  absa-service:
    image: hoanghy/aqa-absa-service:latest
    build:
      context: ./aqa-crawl-data/src/sentiment-analysis
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - BUNDLE_DIR=./fold_01
      - HOST=0.0.0.0
      - PORT=8001

  postgres:
    image: postgres:17.5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jnhbgvfc
      POSTGRES_DB: aqa
    volumes:
      - postgresql-volume:/var/lib/postgresql/data
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aqa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgresql-volume: 
    external: true
    name: aqa-backend-nestjs_postgresql-volume
