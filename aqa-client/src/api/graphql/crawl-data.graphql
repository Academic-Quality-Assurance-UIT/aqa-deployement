# ========================
# Queries
# ========================

query GetCrawlJobs($type: CrawlJobType) {
  crawlJobs(type: $type) {
    crawl_job_id
    type
    status
    started_at
    completed_at
    error_message
    summary
    parameters
    created_by
    created_at
    progress
    total_data
    detail_progress
    detail_total
    last_activity_at
  }
}

query GetCrawlJob($id: String!) {
  crawlJob(id: $id) {
    crawl_job_id
    type
    status
    started_at
    completed_at
    error_message
    summary
    parameters
    created_by
    created_at
    progress
    total_data
    detail_progress
    detail_total
    last_activity_at
  }
}

query GetCrawlStagingData($jobId: String!, $limit: Int, $offset: Int, $dataType: String) {
  crawlStagingData(jobId: $jobId, limit: $limit, offset: $offset, dataType: $dataType) {
    id
    data_type
    data
    created_at
  }
}

query GetCrawlStagingDataSummary($jobId: String!) {
  crawlStagingDataSummary(jobId: $jobId) {
    totalRecords
    byType {
      type
      count
    }
  }
}

query GetCrawlJobLogs($jobId: String!, $limit: Int, $offset: Int) {
  crawlJobLogs(jobId: $jobId, limit: $limit, offset: $offset) {
    id
    timestamp
    service
    endpoint
    method
    status_code
    duration_ms
    error
    metadata
    api_log_id
  }
}

query GetCrawlApiRequestLogs($jobId: String!, $limit: Int, $offset: Int) {
  crawlApiRequestLogs(jobId: $jobId, limit: $limit, offset: $offset) {
    id
    created_at
    request_url
    request_method
    response_status_code
    duration_ms
    error_message
  }
}

query GetCrawlApiRequestLog($id: String!) {
  crawlApiRequestLog(id: $id) {
    id
    created_at
    request_url
    request_method
    request_params
    request_headers
    response_status_code
    response_body
    response_headers
    duration_ms
    error_message
  }
}

query GetSurveyListConfigs($type: CrawlJobType) {
  surveyListConfigs(type: $type) {
    id
    survey_type
    sid
    title
    type
    year
    semester_type
    semester_name
    is_active
    last_crawled_at
    created_at
    updated_at
  }
}

# ========================
# Mutations - Run Jobs
# ========================

mutation RunCrawlSubjectSurvey($semester: String, $surveyConfigIds: [String!]) {
  runCrawlSubjectSurvey(semester: $semester, surveyConfigIds: $surveyConfigIds) {
    crawl_job_id
    type
    status
    started_at
  }
}

mutation RunCrawlLecturerSurvey($semester: String, $surveyConfigIds: [String!]) {
  runCrawlLecturerSurvey(semester: $semester, surveyConfigIds: $surveyConfigIds) {
    crawl_job_id
    type
    status
    started_at
  }
}

mutation RunCrawlStaffSurvey($year: String) {
  runCrawlStaffSurvey(year: $year) {
    crawl_job_id
    type
    status
    started_at
  }
}

mutation RunAggregatePoints {
  runAggregatePoints {
    crawl_job_id
    type
    status
    started_at
  }
}

mutation RunTransferData {
  runTransferData {
    crawl_job_id
    type
    status
    started_at
  }
}

# ========================
# Mutations - Confirm / Abandon
# ========================

mutation ConfirmCrawlJob($jobId: String!) {
  confirmCrawlJob(jobId: $jobId) {
    crawl_job_id
    status
  }
}

mutation AbandonCrawlJob($jobId: String!) {
  abandonCrawlJob(jobId: $jobId) {
    crawl_job_id
    status
  }
}

mutation StopCrawlJob($jobId: String!) {
  stopCrawlJob(jobId: $jobId) {
    crawl_job_id
    status
  }
}

# ========================
# Mutations - Survey List Config
# ========================

mutation AddSurveyListConfig($input: SurveyListConfigInput!) {
  addSurveyListConfig(input: $input) {
    id
    survey_type
    sid
    title
    type
    year
    semester_type
    semester_name
    is_active
  }
}

mutation UpdateSurveyListConfig($id: String!, $input: SurveyListConfigInput!) {
  updateSurveyListConfig(id: $id, input: $input) {
    id
    survey_type
    sid
    title
    year
    is_active
  }
}

mutation DeleteSurveyListConfig($id: String!) {
  deleteSurveyListConfig(id: $id)
}

query getSurveyCrawlHistory($jobId: String, $surveyConfigId: String, $limit: Int, $offset: Int) {
  surveyCrawlHistory(jobId: $jobId, surveyConfigId: $surveyConfigId, limit: $limit, offset: $offset) {
    id
    survey_list_config_id
    crawl_job_id
    sid
    status
    records_fetched
    error_message
    started_at
    completed_at
  }
}

query searchExternalSurveys($keyword: String, $page: Int, $limit: Int, $order: String, $direction: String) {
  searchExternalSurveys(keyword: $keyword, page: $page, limit: $limit, order: $order, direction: $direction)
}

# ========================
# Topic Assignment
# ========================

mutation RunTopicAssignment($semesterIds: [String!]) {
  runTopicAssignment(semesterIds: $semesterIds) {
    crawl_job_id
    type
    status
    started_at
    progress
    total_data
  }
}

query TopicAssignmentPreview($semesterIds: [String!], $limit: Int, $offset: Int) {
  topicAssignmentPreview(semesterIds: $semesterIds, limit: $limit, offset: $offset) {
    totalComments
    assignedComments
    unassignedComments
    samples
  }
}
