mutation AddStaffSurveyData($data: StaffSurveySheetDTO!) {
	addNewStaffSurveyData(data: $data) {
		batch {
			display_name
			staff_survey_batch_id
			updated_at
		}
	}
}

mutation AddListStaffSurveyData($data: [StaffSurveySheetDTO!]!) {
	addListStaffSurveyData(data: $data) {
		batch {
			display_name
			staff_survey_batch_id
			updated_at
		}
	}
}

query GetStaffSurveyCriteriaList {
	getCriteriaList {
		category
		display_name
		index
		semesters
		staff_survey_criteria_id
		mapping_id
		is_shown
	}
}

query GetStaffSurveyBatchList {
	getBatchList {
		display_name
		staff_survey_batch_id
		updated_at
	}
}

query GetSurveySemesterList {
	getSurveySemesterList
}

query GetPointsByCategory($semester: String, $showUnit: Boolean) {
	getPointsByCategory(semester: $semester, showUnit: $showUnit) {
		avg_point
		category
		is_unit
	}
}

query GetPointsByCategoryDonVi($semester: String) {
	getPointsByCategoryDonVi(semester: $semester) {
		avg_point
		category
	}
}

query GetPointsByCriteria($category: String!, $semester: String, $displayName: String) {
	getPointsByCriteria(category: $category, semester: $semester, displayName: $displayName) {
		avg_point
		criteria
		index
	}
}

query GetPointWithCommentByCriteria($category: String, $page: Int, $semester: String, $displayName: String) {
	getPointWithCommentByCriteria(category: $category, pagination: { page: $page }, semester: $semester, displayName: $displayName) {
		data {
			criteria
			index
			point
			comment
			topic
			sentiment
		}
		meta {
			hasNext
			hasPrev
			page
			size
			total_item
			total_page
		}
	}
}

query GetStaffSurveyCommentCount($category: String, $semester: String, $displayName: String) {
	getStaffSurveyCommentCount(category: $category, semester: $semester, displayName: $displayName)
}

query GetAllComments($page: Int, $semester: String, $keyword: String, $type: [String!], $topic: [String!]) {
	getAllComments(pagination: { page: $page }, semester: $semester, keyword: $keyword, type: $type, topic: $topic) {
		data {
			criteria
			index
			point
			comment
			topic
			sentiment
		}
		meta {
			hasNext
			hasPrev
			page
			size
			total_item
			total_page
		}
	}
}

query GetAllCommentsCount($semester: String, $keyword: String, $type: [String!], $topic: [String!]) {
	getAllCommentsCount(semester: $semester, keyword: $keyword, type: $type, topic: $topic)
}

query GetStaffSurveyPointsByYear {
	getStaffSurveyPointsByYear {
		avg_point
		year
	}
}

query GetStaffSurveyPointsByCategoryAndYear {
	getStaffSurveyPointsByCategoryAndYear {
		avg_point
		category
		year
	}
}


mutation UpdateStaffSurveyCriteria($id: String!, $is_shown: Boolean!) {
	updateStaffSurveyCriteria(id: $id, is_shown: $is_shown) {
		staff_survey_criteria_id
		is_shown
	}
}

query StaffSurveyCommentQuantity($semester: String, $type: String, $topic: String) {
    staffSurveyCommentQuantity(semester: $semester, type: $type, topic: $topic) {
        quantity
        type
    }
}

query StaffSurveyCommentQuantityEachTopic($semester: String, $type: String!) {
    it_infrastructure: staffSurveyCommentQuantity(type: $type, topic: "hạ tầng CNTT", semester: $semester) {
        quantity
        type
    }
    facilities: staffSurveyCommentQuantity(type: $type, topic: "cơ sở vật chất", semester: $semester) {
        quantity
        type
    }
    working_environment: staffSurveyCommentQuantity(type: $type, topic: "môi trường/điều kiện làm việc", semester: $semester) {
        quantity
        type
    }
    training_program: staffSurveyCommentQuantity(type: $type, topic: "CTĐT", semester: $semester) {
        quantity
        type
    }
    training_fostering: staffSurveyCommentQuantity(type: $type, topic: "đào tạo, bồi dưỡng", semester: $semester) {
        quantity
        type
    }
    unknown: staffSurveyCommentQuantity(type: $type, topic: "không xác định/không liên quan", semester: $semester) {
        quantity
        type
    }
    unit: staffSurveyCommentQuantity(type: $type, topic: "ĐƠN VỊ", semester: $semester) {
        quantity
        type
    }
    all: staffSurveyCommentQuantity(semester: $semester) {
        quantity
        type
    }
}

query StaffSurveyCommentSummary($semester: String) {
    positive: staffSurveyCommentQuantity(type: "positive", semester: $semester) {
        quantity
        type
    }
    negative: staffSurveyCommentQuantity(type: "negative", semester: $semester) {
        quantity
        type
    }
    neutral: staffSurveyCommentQuantity(type: "neutral", semester: $semester) {
        quantity
        type
    }
    all: staffSurveyCommentQuantity(semester: $semester) {
        quantity
        type
    }
}

query StaffSurveyCommentStatistics($semester: String, $type: [String!], $topic: [String!]) {
    staffSurveyCommentStatistics(semester: $semester, type: $type, topic: $topic) {
        label
        total
        sentiments
        topics
    }
}
